<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startup Manager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #16161f;
      --bg-card-hover: #1c1c28;
      --bg-input: #1a1a26;
      --border: #2a2a3a;
      --border-focus: #4a6cf7;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #4a6cf7;
      --accent-glow: rgba(74, 108, 247, 0.15);
      --success: #22c55e;
      --success-glow: rgba(34, 197, 94, 0.15);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .app { display: flex; flex-direction: column; height: 100vh; }

    .header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-secondary);
      -webkit-user-select: none; user-select: none;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff;
      box-shadow: 0 2px 12px rgba(74, 108, 247, 0.3);
    }
    .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .header h1 span { color: var(--text-muted); font-weight: 400; font-size: 13px; margin-left: 10px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: var(--bg-card);
      color: var(--text-primary); font-size: 13px;
      font-family: inherit; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .btn:hover { background: var(--bg-card-hover); border-color: var(--text-muted); }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-accent:hover { background: #3b5ce0; border-color: #3b5ce0; box-shadow: 0 2px 16px rgba(74, 108, 247, 0.3); }
    .btn-success { background: var(--success); border-color: var(--success); color: #fff; }
    .btn-success:hover { background: #16a34a; box-shadow: 0 2px 16px var(--success-glow); }
    .btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn-icon { padding: 6px 8px; font-size: 16px; line-height: 1; }

    .main { flex: 1; overflow-y: auto; padding: 24px 28px; }

    .stats-bar { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px;
    }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
    .stat-dot.total { background: var(--accent); }
    .stat-dot.running { background: var(--success); animation: pulse 2s infinite; }
    .stat-dot.stopped { background: var(--text-muted); }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--success-glow); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px transparent; }
    }
    .stat-value { font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-label { color: var(--text-secondary); }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 16px;
    }

    .project-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: all 0.25s; position: relative; overflow: hidden;
    }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-color, var(--accent)); opacity: 0.6; transition: opacity 0.25s;
    }
    .project-card:hover { border-color: var(--text-muted); background: var(--bg-card-hover); }
    .project-card:hover::before { opacity: 1; }
    .project-card.running { border-color: rgba(34, 197, 94, 0.3); box-shadow: 0 0 24px var(--success-glow); }
    .project-card.running::before { background: var(--success); opacity: 1; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .card-title-group { flex: 1; }
    .card-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: 11px;
      font-weight: 600; font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-badge.running { background: var(--success-glow); color: var(--success); }
    .status-badge.stopped { background: rgba(85, 85, 106, 0.15); color: var(--text-muted); }
    .card-desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .card-actions { display: flex; gap: 4px; }
    .card-info { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .info-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-secondary); background: var(--bg-input);
      padding: 6px 10px; border-radius: 6px; word-break: break-all;
    }
    .info-icon { flex-shrink: 0; width: 16px; text-align: center; opacity: 0.6; }
    .card-footer { margin-top: 16px; display: flex; gap: 8px; }
    .card-footer .btn { flex: 1; justify-content: center; }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-secondary); }
    .empty-state p { font-size: 14px; margin-bottom: 24px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
      z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius); width: 520px; max-width: 90vw;
      max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow);
      animation: modalIn 0.2s ease-out;
    }
    @keyframes modalIn {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .form-group input, .form-group textarea {
      padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 13px; font-family: 'JetBrains Mono', monospace;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-group textarea { min-height: 60px; resize: vertical; font-family: inherit; }
    .form-group .hint { font-size: 11px; color: var(--text-muted); }
    .color-picker { display: flex; gap: 8px; }
    .color-option {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer; transition: all 0.15s;
    }
    .color-option:hover { transform: scale(1.15); }
    .color-option.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px var(--bg-primary), 0 0 8px rgba(255,255,255,0.2);
    }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .confirm-msg { padding: 24px; text-align: center; }
    .confirm-msg p { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
    .confirm-msg .project-name { color: var(--text-primary); font-weight: 600; }

    .toast-container {
      position: fixed; bottom: 20px; right: 20px;
      z-index: 2000; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      padding: 10px 16px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; box-shadow: var(--shadow);
      animation: toastIn 0.3s ease-out; display: flex; align-items: center; gap: 8px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }
    .toast.info { border-left: 3px solid var(--accent); }
    @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

    .search-box { position: relative; }
    .search-box input {
      padding: 8px 14px 8px 34px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 13px; font-family: inherit;
      width: 220px; outline: none; transition: all 0.2s;
    }
    .search-box input:focus { border-color: var(--border-focus); width: 280px; }
    .search-box .search-icon {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 14px;
    }
    .header-actions { display: flex; align-items: center; gap: 12px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header" data-tauri-drag-region>
      <div class="header-left">
        <div class="logo">⚡</div>
        <h1>Startup Manager <span>项目启动管理器</span></h1>
      </div>
      <div class="header-actions">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="搜索项目..." oninput="filterProjects()" />
        </div>
        <button class="btn btn-accent" onclick="openAddModal()">＋ 新建项目</button>
      </div>
    </div>

    <div class="main">
      <div class="stats-bar" id="statsBar"></div>
      <div class="projects-grid" id="projectsGrid"></div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="projectModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新建项目</h2>
        <button class="btn btn-icon" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>项目名称</label>
          <input type="text" id="inputName" placeholder="例: Admin API Server" />
        </div>
        <div class="form-group">
          <label>工作目录</label>
          <input type="text" id="inputDir" placeholder="例: D:\code_heguo\heguo_admin_api" />
          <span class="hint">项目所在的绝对路径</span>
        </div>
        <div class="form-group">
          <label>启动命令</label>
          <input type="text" id="inputCmd" placeholder="例: gf run main.go" />
          <span class="hint">在工作目录中执行的命令（无需 cd）</span>
        </div>
        <div class="form-group">
          <label>描述（可选）</label>
          <textarea id="inputDesc" placeholder="项目说明..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>标签颜色</label>
          <div class="color-picker" id="colorPicker"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">取消</button>
        <button class="btn btn-accent" onclick="saveProject()">保存</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal" style="width: 400px;">
      <div class="modal-header">
        <h2>确认删除</h2>
        <button class="btn btn-icon" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="confirm-msg">
        <p>确定要删除项目 <span class="project-name" id="deleteProjectName"></span> 吗？</p>
        <p>此操作不可撤销，如果项目正在运行将被终止。</p>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Tauri v2: core module (not 'tauri')
    const { invoke } = window.__TAURI__.core;

    let projects = [];
    let statuses = {};
    let editingId = null;
    let deletingId = null;
    let selectedColor = '#4a6cf7';
    const COLORS = ['#4a6cf7','#7c3aed','#ec4899','#ef4444','#f59e0b','#22c55e','#06b6d4','#8b5cf6'];

    async function init() {
      renderColorPicker();
      await loadProjects();
      setInterval(pollStatuses, 3000);
    }

    async function loadProjects() {
      try {
        projects = await invoke('get_projects');
        await pollStatuses();
        renderAll();
      } catch (e) {
        showToast('加载失败: ' + e, 'error');
      }
    }

    async function pollStatuses() {
      try {
        const list = await invoke('get_all_statuses');
        statuses = {};
        list.forEach(s => statuses[s.id] = s);
        renderStats();
        projects.forEach(p => {
          const card = document.querySelector(`[data-id="${p.id}"]`);
          if (!card) return;
          const running = statuses[p.id]?.running || false;
          card.classList.toggle('running', running);
          const badge = card.querySelector('.status-badge');
          if (badge) {
            badge.className = 'status-badge ' + (running ? 'running' : 'stopped');
            badge.textContent = running ? '● 运行中' : '○ 已停止';
          }
          const startBtn = card.querySelector('.start-btn');
          const stopBtn = card.querySelector('.stop-btn');
          if (startBtn) startBtn.style.display = running ? 'none' : 'flex';
          if (stopBtn) stopBtn.style.display = running ? 'flex' : 'none';
        });
      } catch(e) {}
    }

    function renderAll() { renderStats(); renderProjects(); }

    function renderStats() {
      const total = projects.length;
      const running = projects.filter(p => statuses[p.id]?.running).length;
      document.getElementById('statsBar').innerHTML = `
        <div class="stat-item"><div class="stat-dot total"></div><span class="stat-value">${total}</span><span class="stat-label">总项目</span></div>
        <div class="stat-item"><div class="stat-dot running"></div><span class="stat-value">${running}</span><span class="stat-label">运行中</span></div>
        <div class="stat-item"><div class="stat-dot stopped"></div><span class="stat-value">${total - running}</span><span class="stat-label">已停止</span></div>
      `;
    }

    function renderProjects() {
      const grid = document.getElementById('projectsGrid');
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtered = projects.filter(p =>
        p.name.toLowerCase().includes(search) ||
        p.command.toLowerCase().includes(search) ||
        p.directory.toLowerCase().includes(search) ||
        p.description.toLowerCase().includes(search)
      );
      if (filtered.length === 0) {
        grid.innerHTML = projects.length === 0
          ? `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📦</div><h3>还没有项目</h3><p>点击「新建项目」添加你的第一个启动项</p><button class="btn btn-accent" onclick="openAddModal()">＋ 新建项目</button></div>`
          : `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><h3>未找到匹配项目</h3><p>尝试其他搜索关键词</p></div>`;
        return;
      }
      grid.innerHTML = filtered.map(p => {
        const s = statuses[p.id] || { running: false };
        return `
          <div class="project-card ${s.running ? 'running' : ''}" data-id="${p.id}" style="--card-color: ${p.color || '#4a6cf7'}">
            <div class="card-header">
              <div class="card-title-group">
                <div class="card-title">${escHtml(p.name)}
                  <span class="status-badge ${s.running ? 'running' : 'stopped'}">${s.running ? '● 运行中' : '○ 已停止'}</span>
                </div>
                ${p.description ? `<div class="card-desc">${escHtml(p.description)}</div>` : ''}
              </div>
              <div class="card-actions">
                <button class="btn btn-sm btn-icon" title="编辑" onclick="openEditModal('${p.id}')">✏️</button>
                <button class="btn btn-sm btn-icon" title="删除" onclick="openDeleteModal('${p.id}')">🗑️</button>
              </div>
            </div>
            <div class="card-info">
              <div class="info-row"><span class="info-icon">📁</span>${escHtml(p.directory)}</div>
              <div class="info-row"><span class="info-icon">▶</span>${escHtml(p.command)}</div>
              ${s.pid ? `<div class="info-row"><span class="info-icon">⚙</span>PID: ${s.pid}</div>` : ''}
            </div>
            <div class="card-footer">
              <button class="btn btn-success start-btn" style="display:${s.running ? 'none' : 'flex'}" onclick="startProject('${p.id}')">▶ 启动</button>
              <button class="btn btn-danger stop-btn" style="display:${s.running ? 'flex' : 'none'}" onclick="stopProject('${p.id}')">■ 停止</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderColorPicker() {
      document.getElementById('colorPicker').innerHTML = COLORS.map(c =>
        `<div class="color-option ${c === selectedColor ? 'active' : ''}" style="background:${c}" onclick="selectColor('${c}', this)"></div>`
      ).join('');
    }

    async function startProject(id) {
      try { await invoke('start_project', { id }); showToast('项目已启动', 'success'); await pollStatuses(); renderProjects(); }
      catch (e) { showToast('启动失败: ' + e, 'error'); }
    }
    async function stopProject(id) {
      try { await invoke('stop_project', { id }); showToast('项目已停止', 'info'); await pollStatuses(); renderProjects(); }
      catch (e) { showToast('停止失败: ' + e, 'error'); }
    }

    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = '新建项目';
      document.getElementById('inputName').value = '';
      document.getElementById('inputDir').value = '';
      document.getElementById('inputCmd').value = '';
      document.getElementById('inputDesc').value = '';
      selectedColor = COLORS[0]; renderColorPicker();
      document.getElementById('projectModal').classList.add('active');
      document.getElementById('inputName').focus();
    }
    function openEditModal(id) {
      const p = projects.find(x => x.id === id); if (!p) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = '编辑项目';
      document.getElementById('inputName').value = p.name;
      document.getElementById('inputDir').value = p.directory;
      document.getElementById('inputCmd').value = p.command;
      document.getElementById('inputDesc').value = p.description;
      selectedColor = p.color || COLORS[0]; renderColorPicker();
      document.getElementById('projectModal').classList.add('active');
    }
    function closeModal() { document.getElementById('projectModal').classList.remove('active'); editingId = null; }

    async function saveProject() {
      const name = document.getElementById('inputName').value.trim();
      const directory = document.getElementById('inputDir').value.trim();
      const command = document.getElementById('inputCmd').value.trim();
      const description = document.getElementById('inputDesc').value.trim();
      if (!name || !directory || !command) { showToast('请填写项目名称、工作目录和启动命令', 'error'); return; }
      try {
        if (editingId) {
          projects = await invoke('update_project', { id: editingId, name, directory, command, description, color: selectedColor });
          showToast('项目已更新', 'success');
        } else {
          projects = await invoke('add_project', { name, directory, command, description, color: selectedColor });
          showToast('项目已创建', 'success');
        }
        closeModal(); renderAll();
      } catch (e) { showToast('保存失败: ' + e, 'error'); }
    }

    function openDeleteModal(id) {
      deletingId = id;
      const p = projects.find(x => x.id === id);
      document.getElementById('deleteProjectName').textContent = p ? p.name : '';
      document.getElementById('deleteModal').classList.add('active');
    }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('active'); deletingId = null; }
    async function confirmDelete() {
      if (!deletingId) return;
      try {
        projects = await invoke('delete_project', { id: deletingId });
        showToast('项目已删除', 'info'); closeDeleteModal(); renderAll();
      } catch (e) { showToast('删除失败: ' + e, 'error'); }
    }

    function selectColor(c, el) {
      selectedColor = c;
      document.querySelectorAll('.color-option').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    }
    function filterProjects() { renderProjects(); }
    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function showToast(msg, type = 'info') {
      const c = document.getElementById('toastContainer'), t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${{success:'✓',error:'✗',info:'ℹ'}[type]||'ℹ'}</span> ${escHtml(msg)}`;
      c.appendChild(t);
      setTimeout(() => { t.style.animation = 'toastOut 0.3s forwards'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); closeDeleteModal(); }
      if (e.key === 'Enter' && document.getElementById('projectModal').classList.contains('active')) saveProject();
    });

    init();
  </script>
</body>
</html>
